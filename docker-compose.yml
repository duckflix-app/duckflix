name: 'duckflix'
services:
    redis:
        image: redis:7-alpine
        container_name: duckflix_redis
        restart: always
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - duckflix_network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5
    postgres:
        image: postgres:16-alpine
        container_name: duckflix_db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PSWD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '5432:5432'
        networks:
            - duckflix_network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        container_name: 'duckflix_backend'
        build:
            context: .
            dockerfile: packages/backend/Dockerfile
        restart: always
        init: true
        tty: true
        depends_on:
            postgres:
                condition: 'service_healthy'
        ports:
            - '3000:3000'
        env_file:
            - packages/backend/.docker.env
        environment:
            - NODE_ENV=production
        volumes:
            - ./data:/app/data
        networks:
            - duckflix_network
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
    frontend:
        container_name: duckflix_frontend
        build:
            context: .
            dockerfile: packages/frontend/Dockerfile
        restart: always
        ports:
            - '5173:80'

networks:
    duckflix_network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
